<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MenuPilot AI — Restaurant Costing, Pricing & Profitability</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css?v=20260615b">

<!-- Supabase JS — CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- SheetJS — Excel (.xlsx) ingredient import/export (CSV fallback if this fails to load) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<!-- Inject Supabase credentials (replaced at build/deploy time via Vercel env) -->
<script>
  window.SUPABASE_URL  = '__SUPABASE_URL__';
  window.SUPABASE_ANON = '__SUPABASE_ANON_KEY__';
</script>
</head>
<body>
<div id="root"></div>
<div class="toast-wrap" id="toasts"></div>
<div id="modalhost"></div>

<!-- Load modules in dependency order -->
<script src="/js/core.js?v=20260615b"></script>
<script src="/js/state.js?v=20260615b"></script>
<script src="/js/db.js?v=20260615b"></script>
<script src="/js/cost-engine.js?v=20260615b"></script>
<script src="/js/agents.js?v=20260615b"></script>
<script src="/js/pages-public.js?v=20260615b"></script>
<script src="/js/pages-onboard.js?v=20260615b"></script>
<script src="/js/pages-app.js?v=20260615b"></script>
<script src="/js/router.js?v=20260615b"></script>

<script>
// Boot — check Supabase session on load
(async () => {
  try {
    const { session } = await DB.getSession();
    if (session) {
      const { user } = await DB.getUser();
      const { data: orgs } = await DB.getUserOrgs();
      const th = STATE.theme, lg = STATE.lang;
      const uname = user.user_metadata?.name || user.user_metadata?.full_name || user.email;
      if (orgs && orgs.length) {
        const orgState = await DB.loadOrgState(orgs[0].id);
        STATE = { ...blankState(), ...orgState, authed: true, verified: true, theme: th, lang: lg };
        STATE.user = { n: uname, email: user.email, role: 'Owner' };
        STATE.route = 'dash';
      } else {
        // Authenticated (e.g. via Google) but no workspace yet — provision one
        // and send them through onboarding.
        const orgState = await provisionOrgForUser(user);
        STATE = { ...blankState(), ...(orgState || {}), authed: true, verified: true, theme: th, lang: lg };
        STATE.user = { n: uname, email: user.email, role: 'Owner' };
        STATE.ob = { step: 1, src: 'paste', extracted: false };
        STATE.route = 'onboarding';
      }
    }
    DB.onAuthChange(async (event, _session) => {
      if (event === 'SIGNED_OUT') {
        const th = STATE.theme, lg = STATE.lang;
        STATE = blankState(); STATE.theme = th; STATE.lang = lg;
        go('landing');
      }
    });
  } catch (err) {
    console.error('[MenuPilot] Boot error:', err);
  } finally {
    render();
  }
})();
</script>
</body>
</html>
